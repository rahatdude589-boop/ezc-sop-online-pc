<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Due Report</title>
  <link rel="stylesheet" href="duereport.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>

<script>

async function checkSession(){

const { data } = await supabaseClient.auth.getSession();

if(!data.session){
window.location.href = "login.html";
}

}

checkSession();

</script>
</head>

<style>
  .nav-buttons-top {
  display: flex;
  justify-content: flex-start; /* align left */
  gap: 10px;
  padding: 10px;
  background: #f4f6f8;
  border-bottom: 1px solid #ccc;
}

.nav-buttons-top button {
  padding: 6px 12px;
  border: 1px solid #ccc;
  border-radius: 4px;
  background: white;
  cursor: pointer;
  font-size: 14px;
}

.nav-buttons-top button:hover {
  background: #e0e0e0;
}
</style>
<body>
  <div class="nav-buttons-top">
  <button id="backBtn">⬅ Back</button>
  
</div>
<script>
  const backBtn = document.getElementById('backBtn');
  const forwardBtn = document.getElementById('forwardBtn');

  backBtn.addEventListener('click', () => {
    history.back();
  });

  forwardBtn.addEventListener('click', () => {
    history.forward();
  });
</script>



<section class="panel reports">
  <h2>Dues</h2>

  <!-- Filters -->
  <div class="report-filters">
    <label for="reportDate">Select Date:</label>
    <input type="date" id="reportDate">

    <label for="reportMonth">Select Month:</label>
    <input type="month" id="reportMonth">
    <br>
    <button class="primary" onclick="generateDailyReport()">Daily Report</button>
    <button class="primary" onclick="generateMonthlyReport()">Monthly Report</button>
  </div>

  
  <!-- Export -->
  <!-- Export + Search -->
<div class="export-buttons">
  <button onclick="exportPDF()" class="export pdf">Export PDF</button>

  <input 
    type="text" 
    id="searchCustomer" 
    placeholder="Search Customer Name / Phone"
    style=" margin-left:auto;
  padding:6px 10px;
  border:1px solid #ccc;
  border-radius:4px;
  width:550px;"
 
  >
</div>

  <!-- Desktop Table -->
  <table class="due-table">
    <thead>
      <tr>
        <th>#</th>
        <th>Bill ID</th>
        <th>Bill Date</th>
        <th>Customer Details</th>
        <th>Payment History</th>
        <th>Grand Total</th>
        <th>Total Paid</th>
        <th>Remaining Due</th>
        <th>Action</th>
      </tr>
    </thead>

    <tbody id="reportBody">
      <!-- Filled dynamically by duereport.js -->
    </tbody>
  </table>

  <!-- Mobile Cards -->
  <div id="dueCards"></div>

</section>

<script src="lang.js"></script>
<script src="duereport.js"></script>

</body>
</html>
