<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Management</title>
<link rel="stylesheet" href="product-list.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>

<script>

async function checkSession(){

const { data } = await supabaseClient.auth.getSession();

if(!data.session){
window.location.href = "login.html";
}

}

checkSession();

</script>
</head>

<style>
  .nav-buttons-top {
  display: flex;
  justify-content: flex-start; /* align left */
  gap: 10px;
  padding: 10px;
  background: #f4f6f8;
  border-bottom: 1px solid #ccc;
}

.nav-buttons-top button {
  padding: 6px 12px;
  border: 1px solid #ccc;
  border-radius: 4px;
  background: white;
  cursor: pointer;
  font-size: 14px;
}

.nav-buttons-top button:hover {
  background: #e0e0e0;
}
</style>
<body>
  <div class="nav-buttons-top">
  <button id="backBtn">⬅ Back</button>
  <button id="forwardBtn">➡ Forward</button>
</div>
<script>
  const backBtn = document.getElementById('backBtn');
  const forwardBtn = document.getElementById('forwardBtn');

  backBtn.addEventListener('click', () => {
    history.back();
  });

  forwardBtn.addEventListener('click', () => {
    history.forward();
  });
</script>

<body>
<div class="container">

  <h1>Product Management</h1>

  <div class="top-bar">
    <button id="addProductBtn" class="btn blue">+ Add Product</button>
    <button id="lowStockBtn" class="btn orange">Show Low Stock</button>

<button id="stockHistoryBtn" class="btn gray">Stock History</button>

    <div class="download-group">
  <div class="dropdown">
    <button class="btn green">Download List ⬇</button>
    <div class="dropdown-content">
      <a href="#" data-type="all" data-format="excel">Excel</a>
      <a href="#" data-type="all" data-format="csv">CSV</a>
      <a href="#" data-type="all" data-format="pdf">PDF</a>
    </div>
  </div>

  <div class="dropdown">
    <button class="btn red">Download Low Stock ⬇</button>
    <div class="dropdown-content">
      <a href="#" data-type="low" data-format="excel">Excel</a>
      <a href="#" data-type="low" data-format="csv">CSV</a>
      <a href="#" data-type="low" data-format="pdf">PDF</a>
    </div>
  </div>
</div>


    <input type="text" id="searchInput" placeholder="Search..." />
  </div>
  <div class="table-wrapper">
  <table id="productTable">
    <thead>
      <tr>
        <th>Image</th>
        <th>Product Code</th>
        <th>Name</th>
        <th>Price</th>
        <th>Stock</th>
        <th>Mfg. Date</th>
        <th>Exp. Date</th>
        <th>Details</th>
        <th>Status</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <!-- Products dynamically populated -->
    </tbody>
  </table>
 </div>
  <div class="footer">
    <span id="totalProducts">Total Products: 0</span>
    <span id="lowStockCount">Low Stock Items: 0</span>
  </div>
</div>

<!-- ======================= -->
<!-- ADD / EDIT MODAL -->
<!-- ======================= -->
<div id="modal" class="modal">
  <div class="modal-content">
    <span id="closeModal" class="close">&times;</span>
    <h2 id="modalTitle">Add / Edit Product</h2>

    <label>Product Code</label>
    <input type="text" id="modalCode">

    <label>Name</label>
    <input type="text" id="modalName">

    <label>Price</label>
    <input type="number" id="modalPrice">

    <label>Stock</label>
    <input type="number" id="modalStock">

    <label>Mfg. Date</label>
<input type="date" id="modalMfgDate">

<label>Exp. Date</label>
<input type="date" id="modalExpDate">

<label>Details / Comment</label>
<textarea id="modalComment" rows="3" placeholder="Enter product details..."></textarea>


  <label>Unit</label>

<select id="modalUnit"></select>

<div class="unit-actions">
  <button id="favoriteUnitBtn" class="btn green">⭐ Favorite</button>
  <button id="removeUnitBtn" class="btn red">❌ Remove Unit</button>
</div>

<input
  type="text"
  id="customUnitInput"
  placeholder="Enter unit"
  style="display:none;"
>

  

    <label>Image</label>
    <input type="file" id="modalImage" accept="image/*">


<div class="modal-buttons">
  <button id="saveChangesBtn" class="btn blue">Save</button>
  <div class="spacer"></div>
  <button id="cancelBtn" class="btn gray">Cancel</button>
  <button id="removeProductBtn" class="btn red">Remove</button>
</div>

  </div>
</div>

<!-- ======================= -->
<!-- FULL-SIZE IMAGE MODAL -->
<!-- ======================= -->
<div id="imageModal" class="modal">
  <span class="close" id="imageModalClose">&times;</span>
  <img id="fullImage" class="modal-image" src="" alt="Product Image">
</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.5.29/dist/jspdf.plugin.autotable.min.js"></script>

<script src="lang.js"></script>
<script src="sync.js"></script>
<script src="syncDeletedProducts.js"></script>
<!--<script src="deletedProductsSetup.js"></script>  -->      
<script src="product-list.js"></script>
<!--<script src="deleteProducts.js"></script>-->
<script src="stock-history.js"></script>


</body>
</html>
