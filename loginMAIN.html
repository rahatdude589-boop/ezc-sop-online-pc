<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <link rel="stylesheet" href="authMAIN.css">
</head>
<body>
<div style="position: relative;"
<h2>Login</h2>

<input type="text" id="username" placeholder="Username"><br><br>

<input type="password" id="password" placeholder="Password">


  <span id="togglePassword" style="position:absolute; right:10px; top:12px; cursor:pointer;">👁</span>

<button onclick="login()">Login</button>
</div>
<script>
function login() {
  const user = document.getElementById("username").value;
  const pass = document.getElementById("password").value;

  // SIMPLE HARD-CODED LOGIN
  if (user === "EZebraCross" && pass === "SlaveOFAllah4PeoPlE%#247") {
    localStorage.setItem("loggedIn", "true");
    window.location.href = "index.html";
  } else {
    alert("Wrong username or password");
  }
}
   const togglePassword = document.getElementById('togglePassword');
const passwordInput = document.getElementById('password');

togglePassword.addEventListener('click', () => {
    const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
    passwordInput.setAttribute('type', type);
    
    // Optional: change icon for fun
    togglePassword.textContent = type === 'password' ? '👁' : '🙈';
});

</script>

</body>
</html>
