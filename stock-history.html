<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stock History</title>
<link rel="stylesheet" href="product-list.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>

<script>

async function checkSession(){

const { data } = await supabaseClient.auth.getSession();

if(!data.session){
window.location.href = "login.html";
}

}

checkSession();

</script>
</head>
<style>
  .nav-buttons-top {
  display: flex;
  justify-content: flex-start; /* align left */
  gap: 10px;
  padding: 10px;
  background: #f4f6f8;
  border-bottom: 1px solid #ccc;
}

.nav-buttons-top button {
  padding: 6px 12px;
  border: 1px solid #ccc;
  border-radius: 4px;
  background: white;
  cursor: pointer;
  font-size: 14px;
}

.nav-buttons-top button:hover {
  background: #e0e0e0;
}
</style>
<body>
  <div class="nav-buttons-top">
  <button id="backBtn">⬅ Back</button>
  
</div>
<script>
  const backBtn = document.getElementById('backBtn');
  const forwardBtn = document.getElementById('forwardBtn');

  backBtn.addEventListener('click', () => {
    history.back();
  });

  forwardBtn.addEventListener('click', () => {
    history.forward();
  });
</script>

<body>

<div class="container">
  <h1>Stock History</h1>

 

    <label>Select Date:</label>
    <input type="date" id="historyDate">

    <label>Select Month:</label>
    <input type="month" id="historyMonth">

    <button class="btn blue" onclick="loadDailyHistory()">Daily Report</button>
    <button class="btn blue" onclick="loadMonthlyHistory()">Monthly Report</button>

    <button id="downloadStockHistoryPDF" class="btn red">
      Download PDF ⬇
    </button>
  </div>
  <div class="table-wrapper">
  <table id="stockHistoryTable">
    <thead>
      <tr>
        <th>Date</th>
        <th>Product Code</th>
        <th>Name</th>
        <th>Quantity Change</th>
        <th>Current Stock</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.5.29/dist/jspdf.plugin.autotable.min.js"></script>

<script src="lang.js"></script>
<script src="stock-history.js"></script>

<!--<script>
window.onload = function() {
  loadStockHistory(); // Auto load all history
};
</script>-->

</body>
</html>
