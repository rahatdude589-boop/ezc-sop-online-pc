async function checkSession(){

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f4f6f8;
  }

  .app {
    display: grid;
    grid-template-columns: 1fr 1.6fr 1fr;
    gap: 15px;
    padding: 15px;
    height: 100vh;
  }

  .panel {
    background: #ffffff;
    border: 1px solid #d1d5db;
    border-radius: 6px;
    padding: 15px;
    display: flex;
    flex-direction: column;
  }

  h2 {
    margin-top: 0;
  }

  label {
    margin-top: 10px;
    font-size: 13px;
  }

  input, textarea {
    padding: 8px;
    margin-top: 4px;
  }

  /* ===== NAVIGATION TOGGLE ===== */
  #navToggleBtn {
    font-size: 20px;
    padding: 8px 12px;
    background-color: #fafafa;
    color: rgb(163, 163, 163);
    border: none;
    border-radius: 6px;
    cursor: pointer;
    width: 100%;
    text-align: left;
    margin-bottom: 10px;
  }

  #navButtons {
    display: none;
    margin-bottom: 10px;
    flex-direction: column;
  }

  #navButtons button {
    display: block;
    width: 100%;
    margin-top: 5px;
    padding: 8px;
    text-align: left;
  }
</style>

<button onclick="backupAll()">Backup All</button>

<script src="backupRestore.js"></script>
<script>
function handleRestore() {
    const input = document.getElementById("restoreFiles");
    if (input.files.length === 0) return alert("Select backup files first");
    restoreAll(input.files);
}
</script>

<script>
  // TOGGLE NAV BUTTONS
  document.addEventListener('DOMContentLoaded', () => {
  const toggleBtn = document.getElementById('navToggleBtn');
  const navButtons = document.getElementById('navButtons');

  toggleBtn.addEventListener('click', () => {
    if(navButtons.style.display === "none" || navButtons.style.display === "") {
      navButtons.style.display = "flex";
    } else {
      navButtons.style.display = "none";
    }
  });
});
</script>
