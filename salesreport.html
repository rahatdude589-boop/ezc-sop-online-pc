<!DOCTYPE html>
<html>
<head>
  <title>Sales Report</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>

<script>

async function checkSession(){

const { data } = await supabaseClient.auth.getSession();

if(!data.session){
window.location.href = "login.html";
}

}

checkSession();

</script>
</head>

<body><style>
  .nav-buttons-top {
  display: flex;
  justify-content: flex-start; /* align left */
  gap: 10px;
  padding: 10px;
  background: #f4f6f8;
  border-bottom: 1px solid #ccc;
}

.nav-buttons-top button {
  padding: 6px 12px;
  border: 1px solid #ccc;
  border-radius: 4px;
  background: white;
  cursor: pointer;
  font-size: 14px;
}

.nav-buttons-top button:hover {
  background: #e0e0e0;
}
</style>
<body>
  
<section class="panel reports">
  <div class="nav-buttons-top">
  <button id="backBtn">⬅ Back</button>
  
</div>
<script>
  const backBtn = document.getElementById('backBtn');
  const forwardBtn = document.getElementById('forwardBtn');

  backBtn.addEventListener('click', () => {
    history.back();
  });

  forwardBtn.addEventListener('click', () => {
    history.forward();
  });
</script>


  <h2>Sales Report</h2>

  
  <div class="report-filters">
    <label for="reportDate">Select Date:</label>
    <input type="date" id="reportDate">

    <label for="reportMonth">Select Month:</label>
    <input type="month" id="reportMonth">

    <button class="primary" onclick="generateDailyReport()">Daily Report</button>
    <button class="primary" onclick="generateMonthlyReport()">Monthly Report</button>
  </div>

  <div class="export-buttons">
    <!-- <button onclick="exportCSV()" class="export csv">Export CSV</button>
    <button onclick="exportExcel()" class="export excel">Export Excel</button>-->
    <button onclick="exportPDF()" class="export pdf">Export PDF</button>
  </div>

  <h3>Sales Report Preview</h3>

   <table class="report-table">
    <thead>
      <tr>
        <th>#</th>
        <th>Date<br>তারিখ</th>
        <th>Time<br>সময়</th>
        <th>Customer Details<br>গ্রাহকের বিবরণ</th>
        <th>Items<br>পণ্য</th>
        <th>Subtotal<br>মোট</th>
         <!-- <th>GST<br></th> -->
         <th>VAT<br>ভ্যাট</th>
        <th>Discount<br>ছাড়</th>
        <th>Grand Total<br>সর্বমোট</th>
        <th>Paid Amount<br>পরিশোধ</th>
        <th>Due Amount<br>বকেয়া</th>
        
      </tr>
    </thead>
    <tbody id="reportBody">
      <!-- Filled dynamically -->
   </tbody>
  </table>

</section>

<script src="lang.js"></script>
<script src="syncSales.js"></script>
<script src="salesreport.js"></script>

</body>
</html>
