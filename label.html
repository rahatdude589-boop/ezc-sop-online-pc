<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> Label Maker</title>
<link rel="stylesheet" href="label.css">
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>

<script>

async function checkSession(){

const { data } = await supabaseClient.auth.getSession();

if(!data.session){
window.location.href = "login.html";
}

}

checkSession();

</script>
</head>

<style>
  .nav-buttons-top {
  display: flex;
  justify-content: flex-start; /* align left */
  gap: 10px;
  padding: 10px;
  background: #f4f6f8;
  border-bottom: 1px solid #ccc;
}

.nav-buttons-top button {
  padding: 6px 12px;
  border: 1px solid #ccc;
  border-radius: 4px;
  background: white;
  cursor: pointer;
  font-size: 14px;
}

.nav-buttons-top button:hover {
  background: #e0e0e0;
}
</style>
<body>
  <div class="nav-buttons-top">
  <button id="backBtn">⬅ Back</button>
  
</div>
<script>
  const backBtn = document.getElementById('backBtn');
  const forwardBtn = document.getElementById('forwardBtn');

  backBtn.addEventListener('click', () => {
    history.back();
  });

  forwardBtn.addEventListener('click', () => {
    history.forward();
  });
</script>



<div class="container">

  <!-- LEFT PANEL -->
  <div class="panel options">
    <h2>Label Editor</h2>

    <label>Search Product (Name/Code)</label>
    <input type="text" id="productSearch" placeholder="Search product...">
    <ul id="searchResults" class="search-results"></ul>

    <label>Barcode (override)</label>
    <input type="text" id="barcodeData" placeholder="Enter barcode">
    
    <label>Barcode Format</label>
<select id="barcodeFormat">
  <option value="CODE128">CODE128</option>
  <option value="EAN13">EAN13</option>
  <option value="UPC">UPC</option>
  <option value="CODE39">CODE39</option>
  <option value="ITF14">ITF14</option>
  <option value="MSI">MSI</option>
</select>

    <label>Label Width (mm)</label>
    <input type="number" id="labelWidth" value="50">

    <label>Label Height (mm)</label>
    <input type="number" id="labelHeight" value="30">

    <label>Font Size (px)</label>
    <input type="number" id="fontSize" value="12">

    <label>Rows per Page</label>
    <input type="number" id="rowsPerPage" value="1">

    <label>Columns per Page</label>
    <input type="number" id="colsPerPage" value="1">

    <h3>Edit Selected Text</h3>
    <label>Text:</label>
    <textarea id="editText" rows="3"></textarea>

    <label>Rotate (degree)</label>
<input type="number" id="editRotate" value="0">

<label>Barcode Width</label>
<input type="number" id="barcodeWidth" value="2">

<label>Barcode Height</label>
<input type="number" id="barcodeHeight" value="40">


    <label>Font Family</label>
<select id="editFontFamily">
  <option value="Arial">Arial</option>
  <option value="Roboto">Roboto</option>
  <option value="Montserrat">Montserrat</option>
  <option value="Inter">Inter</option>
</select>

<link href="https://fonts.googleapis.com/css2?family=Roboto&family=Montserrat&family=Inter&display=swap" rel="stylesheet">




    <label>Font Size:</label>
    <input type="number" id="editFontSize">

    <label>Color:</label>
    <input type="color" id="editColor">

    <label>Alignment:</label>
    <select id="editAlign">
      <option value="left">Left</option>
      <option value="center">Center</option>
      <option value="right">Right</option>
    </select>


    <button id="generateLabelsBtn">Generate Labels</button>
    
    <label>Printer DPI</label>
<select id="printerDPI">
  <option value="203">203 DPI (Standard)</option>
  <option value="300">300 DPI (High)</option>
</select>

    <button id="printLabelsBtn">Print Sheet</button>
    <button id="saveLabelsBtn">Save as Image</button>
    <button id="saveForProductBtn">Save Label for This Product</button>
<button id="saveForAllBtn">Save Label for All Products</button>



    <button id="undoBtn">Undo</button>
    <button id="redoBtn">Redo</button>
  </div>

  <!-- RIGHT PANEL -->
  <div class="panel preview">
    <h2>Label Sheet Preview</h2>
    <div id="labelSheet" class="label-sheet"></div>
  </div>

</div>

<script src="label.js"></script>

</body>
</html>
